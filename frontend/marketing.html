<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SóDigita — Gerente de Marketing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #0f0f0f; color: #e9edef; height: 100vh; display: flex; flex-direction: column; }

  header { background: #1a0a2e; padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #e91e8c; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header-info h2 { font-size: 16px; font-weight: 600; color: #fff; }
  .header-info p { font-size: 13px; color: #8696a0; }

  #mensagens { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

  .balao { max-width: 75%; padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; }
  .balao.usuario { background: #2e0a1f; align-self: flex-end; border-radius: 10px 0 10px 10px; }
  .balao.agente { background: #1a0a2e; align-self: flex-start; border-radius: 0 10px 10px 10px; border-left: 3px solid #e91e8c; white-space: pre-wrap; }
  .balao .hora { font-size: 11px; color: #8696a0; text-align: right; margin-top: 6px; }
  .balao.agente strong { color: #f472b6; }

  .digitando { background: #1a0a2e; align-self: flex-start; border-radius: 0 10px 10px 10px; padding: 12px 16px; border-left: 3px solid #e91e8c; }
  .digitando span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #e91e8c; animation: bounce 1.2s infinite; margin: 0 2px; }
  .digitando span:nth-child(2) { animation-delay: 0.2s; }
  .digitando span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  footer { background: #1a0a2e; padding: 12px 16px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
  #input { flex: 1; background: #0f0f1a; border: 1px solid #333; border-radius: 8px; padding: 12px 16px; color: #e9edef; font-size: 15px; outline: none; }
  #input:focus { border-color: #e91e8c; }
  #input::placeholder { color: #8696a0; }
  button { background: #e91e8c; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  button svg { fill: white; }

  #sugestoes { padding: 8px 20px; display: flex; flex-wrap: wrap; gap: 6px; }
  .sugestao { background: #1a0a2e; border: 1px solid #333; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #f472b6; cursor: pointer; }
  .sugestao:hover { border-color: #e91e8c; }
</style>
</head>
<body>

<header>
  <div class="avatar">📣</div>
  <div class="header-info">
    <h2>Gerente de Marketing</h2>
    <p>SóDigita — Prospecção de Professores</p>
  </div>
</header>

<div id="mensagens"></div>

<div id="sugestoes">
  <span class="sugestao" onclick="enviarSugestao(this)">Cria um post para Instagram</span>
  <span class="sugestao" onclick="enviarSugestao(this)">Script de story de 15 segundos</span>
  <span class="sugestao" onclick="enviarSugestao(this)">Mensagem para grupo de WhatsApp</span>
  <span class="sugestao" onclick="enviarSugestao(this)">Calendário de conteúdo da semana</span>
  <span class="sugestao" onclick="enviarSugestao(this)">Como responder "é caro"?</span>
  <span class="sugestao" onclick="enviarSugestao(this)">Estratégia de indicação professor→professor</span>
</div>

<footer>
  <input id="input" type="text" placeholder="O que precisa hoje?" autocomplete="off" />
  <button onclick="enviar()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
      <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"/>
    </svg>
  </button>
</footer>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';
let historico = [];

function hora() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function addMsg(texto, tipo) {
  const div = document.createElement('div');
  div.className = `balao ${tipo}`;
  div.innerHTML = texto.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  div.innerHTML += `<div class="hora">${hora()}</div>`;
  document.getElementById('mensagens').appendChild(div);
  document.getElementById('mensagens').scrollTop = 9999;
}

function addDigitando() {
  const div = document.createElement('div');
  div.className = 'digitando';
  div.id = 'digitando';
  div.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('mensagens').appendChild(div);
  document.getElementById('mensagens').scrollTop = 9999;
  return div;
}

async function enviar() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  document.getElementById('sugestoes').style.display = 'none';
  addMsg(msg, 'usuario');
  const digitando = addDigitando();
  try {
    const res = await fetch(`${API}/marketing`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mensagem: msg, historico })
    });
    const data = await res.json();
    digitando.remove();
    historico = data.historico || [];
    addMsg(data.resposta, 'agente');
  } catch (e) {
    digitando.remove();
    addMsg('❌ Erro ao conectar.', 'agente');
  }
}

function enviarSugestao(el) {
  document.getElementById('input').value = el.textContent;
  enviar();
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') enviar();
});

setTimeout(() => {
  addMsg('📣 Olá! Sou seu gerente de marketing do SóDigita.\n\nMeu foco é te ajudar a vender para professores no Instagram, Facebook e grupos de WhatsApp.\n\nO que precisa hoje — um post, script de story, mensagem para grupo ou estratégia de vendas?', 'agente');
}, 300);
</script>
</body>
</html>
