<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SóDigita — Gerente de Projetos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #0f0f0f; color: #e9edef; height: 100vh; display: flex; flex-direction: column; }

  header { background: #1a1a2e; padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #6c63ff; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header-info h2 { font-size: 16px; font-weight: 600; color: #fff; }
  .header-info p { font-size: 13px; color: #8696a0; }

  #mensagens { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

  .balao { max-width: 70%; padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; }
  .balao.usuario { background: #2e1f6b; align-self: flex-end; border-radius: 10px 0 10px 10px; }
  .balao.manager { background: #1a1a2e; align-self: flex-start; border-radius: 0 10px 10px 10px; border-left: 3px solid #6c63ff; }
  .balao .hora { font-size: 11px; color: #8696a0; text-align: right; margin-top: 6px; }
  .balao.manager p { margin-bottom: 6px; }
  .balao.manager ul, .balao.manager ol { padding-left: 18px; margin: 6px 0; }
  .balao.manager li { margin-bottom: 4px; }
  .balao.manager strong { color: #a78bfa; }

  .digitando { background: #1a1a2e; align-self: flex-start; border-radius: 0 10px 10px 10px; padding: 12px 16px; border-left: 3px solid #6c63ff; }
  .digitando span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #6c63ff; animation: bounce 1.2s infinite; margin: 0 2px; }
  .digitando span:nth-child(2) { animation-delay: 0.2s; }
  .digitando span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  footer { background: #1a1a2e; padding: 12px 16px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
  #input { flex: 1; background: #0f0f1a; border: 1px solid #333; border-radius: 8px; padding: 12px 16px; color: #e9edef; font-size: 15px; outline: none; }
  #input:focus { border-color: #6c63ff; }
  #input::placeholder { color: #8696a0; }
  button { background: #6c63ff; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  button svg { fill: white; }

  .sugestao { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #a78bfa; cursor: pointer; display: inline-block; margin: 2px; }
  .sugestao:hover { border-color: #6c63ff; }
  #sugestoes { padding: 8px 20px; display: flex; flex-wrap: wrap; gap: 6px; }
</style>
</head>
<body>

<header>
  <div class="avatar">🧠</div>
  <div class="header-info">
    <h2>Gerente de Projetos</h2>
    <p>SóDigita — IA Estratégica</p>
  </div>
</header>

<div id="mensagens"></div>

<div id="sugestoes">
  <span class="sugestao" onclick="enviarSugestao(this)">O que faço hoje?</span>
  <span class="sugestao" onclick="enviarSugestao(this)">Qual o maior risco agora?</span>
  <span class="sugestao" onclick="enviarSugestao(this)">Como conseguir os primeiros clientes?</span>
  <span class="sugestao" onclick="enviarSugestao(this)">Status dos sistemas</span>
</div>

<footer>
  <input id="input" type="text" placeholder="Pergunte ao gerente..." autocomplete="off" />
  <button onclick="enviar()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
      <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"/>
    </svg>
  </button>
</footer>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';
let historico = [];

function hora() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function addMsg(texto, tipo) {
  const div = document.createElement('div');
  div.className = `balao ${tipo}`;
  if (tipo === 'manager') {
    // Renderiza markdown simples
    let html = texto
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^### (.*)/gm, '<strong>$1</strong>')
      .replace(/^## (.*)/gm, '<strong>$1</strong>')
      .replace(/^- (.*)/gm, '<li>$1</li>')
      .replace(/^\d+\. (.*)/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
      .replace(/\n/g, '<br>');
    div.innerHTML = html + `<div class="hora">${hora()}</div>`;
  } else {
    div.innerHTML = texto.replace(/\n/g, '<br>') + `<div class="hora">${hora()}</div>`;
  }
  document.getElementById('mensagens').appendChild(div);
  document.getElementById('mensagens').scrollTop = 9999;
}

function addDigitando() {
  const div = document.createElement('div');
  div.className = 'digitando';
  div.id = 'digitando';
  div.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('mensagens').appendChild(div);
  document.getElementById('mensagens').scrollTop = 9999;
  return div;
}

async function enviar() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  document.getElementById('sugestoes').style.display = 'none';
  addMsg(msg, 'usuario');
  const digitando = addDigitando();
  try {
    const res = await fetch(`${API}/manager`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mensagem: msg, historico })
    });
    const data = await res.json();
    digitando.remove();
    historico = data.historico || [];
    addMsg(data.resposta, 'manager');
  } catch (e) {
    digitando.remove();
    addMsg('❌ Erro ao conectar.', 'manager');
  }
}

function enviarSugestao(el) {
  document.getElementById('input').value = el.textContent;
  enviar();
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') enviar();
});

setTimeout(() => {
  addMsg('👋 Olá, Luth! Sou seu gerente de projetos do SóDigita.\n\nPosso te ajudar a priorizar tarefas, analisar riscos, planejar próximos passos e responder qualquer dúvida sobre o projeto.\n\nO que você precisa hoje?', 'manager');
}, 300);
</script>
</body>
</html>
